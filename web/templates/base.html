<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}MediaReporting{% endblock %} — {{ company }}</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
  --border: #30363d; --text: #e6edf3; --muted: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --orange: #f0883e; --red: #f85149; --purple: #bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
     background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 24px;display:flex;align-items:center;gap:0;height:52px;position:sticky;top:0;z-index:100}
.nav-brand{font-weight:700;font-size:16px;color:var(--text);margin-right:32px;white-space:nowrap}
.nav-brand span{color:var(--accent)}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:6px 14px;border-radius:6px;color:var(--muted);font-size:13px;transition:.15s}
.nav-links a:hover,.nav-links a.active{background:var(--surface2);color:var(--text);text-decoration:none}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-time{font-size:11px;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:6px;
     border:1px solid var(--border);background:var(--surface2);color:var(--text);
     cursor:pointer;font-size:13px;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{opacity:.85;color:#000}

/* LAYOUT */
.container{max-width:1280px;margin:0 auto;padding:24px}
.grid-2{display:grid;grid-template-columns:1fr 320px;gap:24px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);
             display:flex;align-items:center;justify-content:space-between}
.card-title{font-weight:600;font-size:14px}
.card-body{padding:18px}

/* RISK BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-CRITICAL{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
.badge-HIGH{background:rgba(240,136,62,.15);color:#f0883e;border:1px solid rgba(240,136,62,.3)}
.badge-MEDIUM{background:rgba(210,153,34,.15);color:#d29922;border:1px solid rgba(210,153,34,.3)}
.badge-LOW{background:rgba(63,185,80,.15);color:#3fb950;border:1px solid rgba(63,185,80,.3)}

/* RISK CARDS */
.risk-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.risk-card{flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);
           border-radius:8px;padding:14px;text-align:center}
.risk-card .num{font-size:28px;font-weight:700;line-height:1}
.risk-card .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.risk-card.c .num{color:#f85149}
.risk-card.h .num{color:#f0883e}
.risk-card.m .num{color:#d29922}
.risk-card.l .num{color:#3fb950}

/* ARTICLE LIST */
.article-item{padding:14px 0;border-bottom:1px solid var(--border)}
.article-item:last-child{border-bottom:none}
.article-title{font-weight:600;font-size:14px;display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.article-title a{color:var(--text)}
.article-title a:hover{color:var(--accent)}
.article-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted);margin-bottom:6px}
.article-meta .src{background:var(--surface2);padding:1px 7px;border-radius:4px;color:var(--accent)}
.article-summary{font-size:13px;color:var(--muted);line-height:1.55}
.score-bar{display:inline-block;width:36px;height:4px;border-radius:2px;
           background:linear-gradient(90deg,var(--accent),var(--purple));
           vertical-align:middle;margin-right:4px;opacity:.6}

/* FEED (Slack style) */
.feed-day{margin-bottom:32px}
.feed-day-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.feed-day-line{flex:1;height:1px;background:var(--border)}
.feed-day-label{font-size:12px;color:var(--muted);white-space:nowrap;
                background:var(--surface);padding:2px 10px;border-radius:20px;
                border:1px solid var(--border)}
.feed-msg{display:flex;gap:12px;padding:10px 12px;border-radius:8px;transition:.1s}
.feed-msg:hover{background:var(--surface2)}
.feed-icon{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:flex;
           align-items:center;justify-content:center;font-size:16px}
.feed-icon.CRITICAL{background:rgba(248,81,73,.2)}
.feed-icon.HIGH{background:rgba(240,136,62,.2)}
.feed-icon.MEDIUM{background:rgba(210,153,34,.2)}
.feed-icon.LOW{background:rgba(63,185,80,.2)}
.feed-content{flex:1;min-width:0}
.feed-content .ftitle{font-weight:600;font-size:14px;color:var(--text)}
.feed-content .ftitle a{color:var(--text)}
.feed-content .ftitle a:hover{color:var(--accent)}
.feed-content .fmeta{font-size:11px;color:var(--muted);margin:3px 0}
.feed-content .fsum{font-size:13px;color:var(--muted);margin-top:4px}

/* SETTINGS */
.form-group{margin-bottom:20px}
.form-label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px}
.form-input{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);
            border-radius:6px;color:var(--text);font-size:14px;outline:none;transition:.15s}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{min-height:80px;resize:vertical;font-family:inherit}
.alert{padding:12px 16px;border-radius:6px;font-size:13px;margin-bottom:16px}
.alert-success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.alert-error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#f85149}

/* SIDEBAR */
.sidebar-section{margin-bottom:20px}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;
               letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.history-item{display:flex;justify-content:space-between;align-items:center;
              padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-item:last-child{border-bottom:none}
.history-date{color:var(--muted)}
.history-counts{display:flex;gap:6px;font-size:11px}
.keyword-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;
             background:var(--surface2);border:1px solid var(--border);color:var(--muted);
             margin:3px}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.filter-select{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
               border-radius:6px;color:var(--text);font-size:13px;outline:none}
.filter-select:focus{border-color:var(--accent)}

/* REPORT LIST */
.report-item{display:flex;align-items:center;padding:8px 12px;border-radius:6px;transition:.1s}
.report-item:hover{background:var(--surface2)}
.report-item .rdate{font-size:13px;color:var(--text);flex:1}
.report-item .rlink{font-size:12px;color:var(--accent)}
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <span class="nav-brand">📰 <span>{{ company }}</span> 미디어</span>
  <div class="nav-links">
    <a href="/" class="{% if request.endpoint=='dashboard' %}active{% endif %}">대시보드</a>
    <a href="/feed" class="{% if request.endpoint=='feed' %}active{% endif %}">피드</a>
    <a href="/settings" class="{% if request.endpoint=='settings' %}active{% endif %}">⚙ 설정</a>
  </div>
  <div class="nav-right">
    <span class="nav-time">{{ now }}</span>
    <button class="btn btn-primary" onclick="runNow()" id="run-btn">▶ 즉시 수집</button>
  </div>
</nav>
<script>
let _pollTimer = null;

function runNow(){
  fetch('/api/run-now',{method:'POST'})
    .then(r=>r.json()).then(d=>{
      if(d.status==='already_running'){
        showStatus();
      } else {
        showStatus();
      }
    });
}

function showStatus(){
  document.getElementById('pipeline-bar').style.display='flex';
  startPolling();
}

function startPolling(){
  if(_pollTimer) return;
  _pollTimer = setInterval(()=>{
    fetch('/api/run-status').then(r=>r.json()).then(updateBar);
  }, 2000);
}

function updateBar(d){
  const bar = document.getElementById('pipeline-bar');
  const stepEl = document.getElementById('ps-step');
  const detailEl = document.getElementById('ps-detail');
  const progEl = document.getElementById('ps-prog');
  const btn = document.getElementById('run-btn');

  if(d.running){
    btn.textContent='⏳ 수집 중...'; btn.disabled=true;
    stepEl.textContent = d.step || '준비 중';
    detailEl.textContent = d.detail || '';
    const pct = d.total_steps > 0 ? Math.round((d.step_num / d.total_steps) * 100) : 0;
    progEl.style.width = pct + '%';
  } else {
    btn.textContent='▶ 즉시 수집'; btn.disabled=false;
    clearInterval(_pollTimer); _pollTimer=null;

    if(d.last_result && d.last_result.error){
      stepEl.textContent='오류 발생';
      detailEl.textContent = d.last_result.error.slice(0,80);
      progEl.style.width='100%'; progEl.style.background='var(--red)';
    } else if(d.step==='완료' || d.last_result){
      const r = d.last_result || {};
      stepEl.textContent='✓ 수집 완료';
      detailEl.textContent = r.new!=null ? `신규 ${r.new}건 저장 (${d.finished_at})` : d.finished_at;
      progEl.style.width='100%';
      setTimeout(()=>{ bar.style.display='none'; progEl.style.background=''; },4000);
    } else {
      bar.style.display='none';
    }
  }
}

// 페이지 로드 시 이미 수집 중이면 자동으로 바 표시
fetch('/api/run-status').then(r=>r.json()).then(d=>{
  if(d.running){ showStatus(); updateBar(d); }
});
</script>
<!-- 파이프라인 진행 상태 바 -->
<div id="pipeline-bar" style="display:none;background:var(--surface);border-bottom:1px solid var(--border);
     padding:10px 24px;align-items:center;gap:16px;position:sticky;top:52px;z-index:99">
  <div style="flex:1;min-width:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span id="ps-step" style="font-size:13px;font-weight:600;color:var(--accent)">준비 중</span>
      <span id="ps-detail" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">
      <div id="ps-prog" style="height:100%;width:0%;background:var(--accent);
           border-radius:2px;transition:width .4s ease"></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;font-size:11px;color:var(--muted);white-space:nowrap">
    <span>1.수집</span><span style="color:var(--border)">→</span>
    <span>2.중복제거</span><span style="color:var(--border)">→</span>
    <span>3.분류</span><span style="color:var(--border)">→</span>
    <span>4.AI요약</span><span style="color:var(--border)">→</span>
    <span>5.저장</span><span style="color:var(--border)">→</span>
    <span>6.감사</span><span style="color:var(--border)">→</span>
    <span>7.리포트</span>
  </div>
</div>

{% block content %}{% endblock %}
</body>
</html>
